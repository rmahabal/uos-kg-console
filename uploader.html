<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UOS Console — load any institution</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--green:#16a34a;--ink:#0f1c19;--muted:#5b6b78;--line:#dde4e1;--bg:#f3f6f5;}
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:Mulish,system-ui,sans-serif;color:var(--ink);background:var(--bg)}
  #bar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--line);background:#fff}
  #bar .lg{font-weight:900;color:var(--green)} #bar .sub{color:var(--muted);font-size:13px}
  #bar button{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;font-weight:800;cursor:pointer}
  #drop{position:absolute;inset:54px 0 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  #drop.hide{display:none}
  .zone{border:2px dashed #b9c7c0;border-radius:18px;background:#fff;padding:54px 70px;max-width:620px;transition:.15s}
  .zone.over{border-color:var(--green);background:#f0faf3}
  .zone h1{font-size:24px;margin:0 0 8px} .zone p{color:var(--muted);margin:6px 0}
  .zone .pick{display:inline-block;margin-top:14px;background:var(--green);color:#fff;border-radius:10px;padding:11px 20px;font-weight:800;cursor:pointer}
  .err{color:#b91c1c;font-weight:700;margin-top:12px;min-height:18px}
  #frameWrap{position:absolute;inset:54px 0 0 0;display:none} #frameWrap.show{display:block}
  iframe{width:100%;height:100%;border:0;background:#fff}
  .hint{font-size:12px;color:var(--muted);margin-top:18px}
</style></head>
<body>
<div id="bar"><span class="lg">Uptiq UOS</span><span class="sub">Knowledge Graph Console — load any institution</span>
  <button id="reset" style="display:none">↺ Load another</button></div>
<div id="drop">
  <div class="zone" id="zone">
    <h1>Drop an institution graph JSON</h1>
    <p>Drag a <b>*_kg_instance.json</b> here, or</p>
    <label class="pick">Choose file<input id="file" type="file" accept=".json,application/json" hidden></label>
    <div class="err" id="err"></div>
    <div class="hint">Runs entirely in your browser. Renders the full console — Overview, Graph Explorer, Provenance — from the file you provide.</div>
  </div>
</div>
<div id="frameWrap"><iframe id="frame" title="console"></iframe></div>
<script src="engine.js"></script>
<script>
let TEMPLATE=null;
fetch('_template_console.html').then(r=>r.text()).then(t=>TEMPLATE=t).catch(()=>{document.getElementById('err').textContent='Could not load template (serve over http).';});
function render(obj){
  try{
    if(!TEMPLATE){document.getElementById('err').textContent='Template still loading — try again in a second.';return;}
    if(!obj||!obj.nodes){document.getElementById('err').textContent='That JSON has no "nodes" — expected an instance graph.';return;}
    const html=KGEngine.buildPage(TEMPLATE,obj);
    document.getElementById('frame').srcdoc=html;
    document.getElementById('drop').classList.add('hide');
    document.getElementById('frameWrap').classList.add('show');
    document.getElementById('reset').style.display='inline-block';
  }catch(e){document.getElementById('err').textContent='Error: '+e.message;}
}
function readFile(f){const rd=new FileReader();rd.onload=()=>{try{render(JSON.parse(rd.result));}catch(e){document.getElementById('err').textContent='Not valid JSON.';}};rd.readAsText(f);}
const zone=document.getElementById('zone');
['dragenter','dragover'].forEach(ev=>zone.addEventListener(ev,e=>{e.preventDefault();zone.classList.add('over');}));
['dragleave','drop'].forEach(ev=>zone.addEventListener(ev,e=>{e.preventDefault();zone.classList.remove('over');}));
zone.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)readFile(f);});
document.getElementById('file').addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);});
document.getElementById('reset').addEventListener('click',()=>{document.getElementById('drop').classList.remove('hide');document.getElementById('frameWrap').classList.remove('show');document.getElementById('reset').style.display='none';document.getElementById('err').textContent='';document.getElementById('frame').srcdoc='';});
window.__renderUrl=u=>fetch(u).then(r=>r.json()).then(render); // test hook
</script>
</body></html>
